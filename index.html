<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mars Strategy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0e14; color: #00ff41; margin: 0; padding: 15px; overflow: hidden; }
        .stat-bar { display: flex; justify-content: space-around; background: #161b22; padding: 10px; border: 1px solid #00ff41; border-radius: 10px; margin-bottom: 15px; font-size: 13px; }
        .log-box { height: 180px; background: #000; border: 1px solid #333; padding: 10px; overflow-y: auto; font-size: 12px; margin-bottom: 15px; color: #aaa; text-align: left; }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: #161b22; color: #00ff41; border: 1px solid #00ff41; padding: 12px 5px; cursor: pointer; font-family: inherit; border-radius: 8px; font-size: 14px; }
        button:active { background: #00ff41; color: #000; }
        .event-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #161b22; border: 2px solid #00ff41; padding: 20px; width: 85%; display: none; z-index: 100; text-align: center; box-shadow: 0 0 20px #000; }
    </style>
</head>
<body>

    <div class="stat-bar">
        <div>⚡ Энергия: <span id="energy">100</span></div>
        <div>📦 Ресурсы: <span id="minerals">50</span></div>
        <div>👥 Люди: <span id="pop">10</span></div>
    </div>

    <div id="game-log" class="log-box">
        <div>> Система готова...</div>
        <div>> Ожидание приказов Командора...</div>
    </div>

    <div class="actions">
        <button onclick="mine()">⛏ Добыть (-5⚡)</button>
        <button onclick="build()">🏗 Построить (-30📦)</button>
        <button onclick="saveGame()" style="grid-column: span 2; border-color: #0088cc; color: #0088cc;">💾 Сохранить прогресс</button>
    </div>

    <div id="event-popup" class="event-popup">
        <h3 id="event-title">Событие!</h3>
        <p id="event-text"></p>
        <div style="display: flex; gap: 10px;">
            <button id="opt1" style="flex:1">Вариант 1</button>
            <button id="opt2" style="flex:1">Вариант 2</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let state = { energy: 100, minerals: 50, pop: 10 };

        function updateUI() {
            document.getElementById('energy').innerText = state.energy;
            document.getElementById('minerals').innerText = state.minerals;
            document.getElementById('pop').innerText = state.pop;
            if (state.energy <= 0 || state.pop <= 0) {
                alert("Миссия провалена! Колония погибла.");
                location.reload();
            }
        }

        function addLog(text) {
            let div = document.createElement('div');
            div.innerText = `> ${text}`;
            let log = document.getElementById('game-log');
            log.prepend(div);
        }

        function mine() {
            if (state.energy >= 5) {
                state.energy -= 5;
                let found = Math.floor(Math.random() * 8) + 3;
                state.minerals += found;
                addLog(`Добыто ресурсов: ${found}`);
                updateUI();
                if (Math.random() > 0.7) showEvent();
            }
        }

        function build() {
            if (state.minerals >= 30) {
                state.minerals -= 30;
                state.pop += 5;
                addLog(`Построено жилье. Прибыло +5 людей.`);
                updateUI();
            } else { addLog(`Мало ресурсов! Нужен металл.`); }
        }

        function showEvent() {
            const events = [
                {
                    title: "Солнечная буря",
                    text: "Выйти наружу для ремонта или переждать в бункере?",
                    opt1: { name: "Чинить (-20📦)", run: () => { state.minerals -= 20; addLog("Ремонт завершен."); } },
                    opt2: { name: "Ждать (-30⚡)", run: () => { state.energy -= 30; addLog("Энергия потеряна."); } }
                },
                {
                    title: "Загадочный сигнал",
                    text: "Вы послали дрон на разведку. Что делать?",
                    opt1: { name: "Захватить (+20📦)", run: () => { state.minerals += 20; } },
                    opt2: { name: "Исследовать (+10⚡)", run: () => { state.energy += 10; } }
                }
            ];
            let ev = events[Math.floor(Math.random() * events.length)];
            document.getElementById('event-title').innerText = ev.title;
            document.getElementById('event-text').innerText = ev.text;
            document.getElementById('event-popup').style.display = 'block';
            document.getElementById('opt1').onclick = () => { ev.opt1.run(); closeEvent(); };
            document.getElementById('opt2').onclick = () => { ev.opt2.run(); closeEvent(); };
        }

        function closeEvent() {
            document.getElementById('event-popup').style.display = 'none';
            updateUI();
        }

        function saveGame() {
            tg.sendData(`SAVE: Ресурсы ${state.minerals}, Население ${state.pop}`);
            tg.HapticFeedback.notificationOccurred('success');
        }

        // Регенерация энергии
        setInterval(() => {
            state.energy = Math.min(state.energy + 1, 100);
            updateUI();
        }, 3000);
    </script>
</body>
</html>
