<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mafia Play</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .card { background: #111; border: 2px solid #0088cc; border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        .avatar { font-size: 60px; }
        .role { font-size: 24px; color: #00ff41; font-weight: bold; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-kill { background: #ff4141; color: white; }
        .btn-vote { background: #00ff41; color: black; }
        .btn-check { background: #0088cc; color: white; }
    </style>
</head>
<body>
    <div class="card">
        <span class="avatar" id="avatar">❓</span>
        <div id="name">Игрок</div>
        <div class="role" id="role">РОЛЬ</div>
    </div>

    <div id="controls">
        <p>Доступные действия:</p>
        <div id="night-actions" style="display:none;">
            <button class="btn-kill" id="kill-btn" onclick="sendAction('kill')">УБИТЬ СЛУЧАЙНОГО БОТА</button>
            <button class="btn-check" id="check-btn" onclick="sendAction('check')">ПРОВЕРИТЬ ИГРОКА</button>
        </div>
        <div id="day-actions">
            <button class="btn-vote" onclick="sendAction('vote')">ГОЛОСОВАТЬ ПРОТИВ ВСЕХ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const params = new URLSearchParams(window.location.search);
        const roleKey = params.get('role_key');
        const roleName = params.get('role');

        document.getElementById('role').innerText = roleName;
        document.getElementById('avatar').innerText = params.get('avatar');
        document.getElementById('name').innerText = params.get('name');

        // Показываем кнопки в зависимости от роли
        if (roleKey === 'mafia') document.getElementById('night-actions').style.display = 'block';
        if (roleKey === 'detective') document.getElementById('night-actions').style.display = 'block';
        if (roleKey === 'doctor') document.getElementById('night-actions').style.display = 'block';

        function sendAction(type) {
            tg.sendData("ACTION:" + type);
            tg.close();
        }
    </script>
</body>
</html>
