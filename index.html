<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mafia Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 15px; }
        .my-card { background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid #0088cc; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0,136,204,0.3); }
        .avatar { font-size: 60px; margin-bottom: 10px; display: block; }
        .role-name { font-size: 24px; color: #00ff41; font-weight: bold; text-transform: uppercase; }
        .status-badge { background: #333; padding: 5px 15px; border-radius: 10px; font-size: 12px; }
        h3 { color: #555; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="my-card" id="card">
        <span class="avatar" id="my-avatar">🕵️‍♂️</span>
        <div id="my-name" style="font-size: 18px; margin-bottom: 5px;">Загрузка...</div>
        <div class="role-name" id="my-role">РОЛЬ СКРЫТА</div>
        <p class="status-badge">СТАТУС: В ИГРЕ</p>
    </div>

    <h3>Живые игроки (6)</h3>
    <div id="player-list" style="color: #666; font-size: 14px;">
        Обсуждайте и голосуйте в чате Telegram!
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Достаем данные из ссылки
        const params = new URLSearchParams(window.location.search);
        if (params.get('role')) {
            document.getElementById('my-role').innerText = params.get('role');
            document.getElementById('my-avatar').innerText = params.get('avatar');
            document.getElementById('my-name').innerText = params.get('name');
            tg.HapticFeedback.impactOccurred('heavy');
        }
    </script>
</body>
</html>
